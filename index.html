<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flash Cards de Programação</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet" />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Rajdhani', sans-serif;
      background:url('https://images.unsplash.com/photo-1515879218367-8466d910aaa4?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size:cover;
      min-height:100vh;
      color:#fff;
      padding:40px 20px;
      display:flex;
      flex-direction:column;
      align-items:center;
      overflow-x:hidden;
    }

    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.65);
      z-index:-1;
    }

    h1{
      font-family:'Orbitron', sans-serif;
      font-size:3rem;
      color:#00ffb2;
      margin-bottom:40px;
      text-shadow:0 0 10px #00ffb2;
    }

    .container{
      width:100%;
      max-width:1400px;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      max-height:80vh;
      overflow-y:auto;
      padding:10px;
    }

    .container::-webkit-scrollbar{
      width:8px;
    }

    .container::-webkit-scrollbar-thumb{
      background:#00ffb2;
      border-radius:10px;
    }

    .flashcard{
      width:300px;
      height:190px;
      perspective:1000px;
      cursor:pointer;
    }

    .card-inner{
      position:relative;
      width:100%;
      height:100%;
      transition:transform .8s;
      transform-style:preserve-3d;
    }

    .flashcard.flipped .card-inner{
      transform:rotateY(180deg);
    }

    .card-front,
    .card-back{
      position:absolute;
      width:100%;
      height:100%;
      border-radius:20px;
      padding:20px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      backface-visibility:hidden;
      box-shadow:0 0 15px rgba(0,255,178,0.4);
    }

    .card-front{
      background:linear-gradient(145deg,#161b33,#232b5d);
      border:2px solid #00ffb2;
    }

    .card-front h2{
      font-family:'Orbitron', sans-serif;
      margin-bottom:15px;
      color:#00ffb2;
    }

    .card-back{
      background:linear-gradient(145deg,#0a3d28,#17b35d);
      transform:rotateY(180deg);
      border:2px solid #6fe68a;
    }

    .card-back h3{
      margin-bottom:15px;
      font-family:'Orbitron', sans-serif;
    }

    .question-text,
    .answer-text{
      line-height:1.5;
      font-size:18px;
      font-weight:600;
    }

    .flashcard:hover{
      transform:scale(1.05);
      transition:.3s;
    }
  </style>
</head>
<body>

  <h1>Flash Cards de Programação 💻</h1>

  <div class="container" id="flashcards-container"></div>

  <script>
    const flashcardsData = [

      {
        topic:'HTML',
        question:'O que significa HTML?',
        answer:'HyperText Markup Language'
      },

      {
        topic:'CSS',
        question:'Para que serve o CSS?',
        answer:'Para estilizar páginas web.'
      },

      {
        topic:'JavaScript',
        question:'Qual comando mostra algo no console?',
        answer:'console.log()'
      },

      {
        topic:'Python',
        question:'Qual símbolo é usado para comentários em Python?',
        answer:'#'
      },

      {
        topic:'JavaScript',
        question:'Qual método adiciona um elemento no final de um array?',
        answer:'push()'
      },

      {
        topic:'HTML',
        question:'Qual tag cria um link?',
        answer:'<a>'
      },

      {
        topic:'CSS',
        question:'Qual propriedade muda a cor do texto?',
        answer:'color'
      },

      {
        topic:'Programação',
        question:'O que é uma variável?',
        answer:'Um espaço para armazenar dados.'
      },

      {
        topic:'JavaScript',
        question:'Qual palavra cria uma constante?',
        answer:'const'
      },

      {
        topic:'Python',
        question:'Como imprimir algo na tela em Python?',
        answer:'print()'
      },

      {
        topic:'HTML',
        question:'Qual tag insere uma imagem?',
        answer:'<img>'
      },

      {
        topic:'CSS',
        question:'Qual propriedade deixa o texto centralizado?',
        answer:'text-align: center'
      },

      {
        topic:'JavaScript',
        question:'Qual operador verifica igualdade estrita?',
        answer:'==='
      },

      {
        topic:'Programação',
        question:'O que é um loop?',
        answer:'Estrutura de repetição.'
      },

      {
        topic:'Python',
        question:'Qual estrutura é usada para repetição?',
        answer:'for e while'
      },

      {
        topic:'HTML',
        question:'Qual tag cria um parágrafo?',
        answer:'<p>'
      },

      {
        topic:'CSS',
        question:'Qual propriedade muda o fundo?',
        answer:'background'
      },

      {
        topic:'JavaScript',
        question:'Como converter texto para número?',
        answer:'Number()'
      },

      {
        topic:'Programação',
        question:'O que é um algoritmo?',
        answer:'Sequência lógica de passos.'
      },

      {
        topic:'Python',
        question:'Qual função recebe dados do usuário?',
        answer:'input()'
      },

      {
        topic:'HTML',
        question:'Qual tag cria um título principal?',
        answer:'<h1>'
      },

      {
        topic:'CSS',
        question:'Qual propriedade arredonda bordas?',
        answer:'border-radius'
      },

      {
        topic:'JavaScript',
        question:'Qual evento detecta clique?',
        answer:'click'
      },

      {
        topic:'Programação',
        question:'O que significa API?',
        answer:'Interface de Programação de Aplicações.'
      },

      {
        topic:'Python',
        question:'Como criar uma lista em Python?',
        answer:'Usando colchetes []'
      },

      {
        topic:'HTML',
        question:'Qual tag cria uma lista não ordenada?',
        answer:'<ul>'
      },

      {
        topic:'CSS',
        question:'Qual propriedade muda o tamanho da fonte?',
        answer:'font-size'
      },

      {
        topic:'JavaScript',
        question:'Qual método remove o último item de um array?',
        answer:'pop()'
      },

      {
        topic:'Programação',
        question:'O que é front-end?',
        answer:'Parte visual de um sistema.'
      },

      {
        topic:'Programação',
        question:'O que é back-end?',
        answer:'Parte lógica e servidor.'
      },

      {
        topic:'Python',
        question:'Qual biblioteca é famosa para IA?',
        answer:'TensorFlow'
      },

      {
        topic:'HTML',
        question:'Qual tag é usada para botão?',
        answer:'<button>'
      },

      {
        topic:'CSS',
        question:'Qual propriedade cria sombra?',
        answer:'box-shadow'
      },

      {
        topic:'JavaScript',
        question:'Qual função espera um tempo?',
        answer:'setTimeout()'
      },

      {
        topic:'Programação',
        question:'O que é banco de dados?',
        answer:'Local onde dados são armazenados.'
      },

      {
        topic:'Python',
        question:'Como criar uma função em Python?',
        answer:'Usando def'
      },

      {
        topic:'HTML',
        question:'Qual tag recebe scripts JavaScript?',
        answer:'<script>'
      },

      {
        topic:'CSS',
        question:'Qual propriedade deixa o elemento invisível?',
        answer:'display: none'
      },

      {
        topic:'JavaScript',
        question:'Qual método seleciona elemento pelo ID?',
        answer:'getElementById()'
      },

      {
        topic:'Programação',
        question:'O que significa IDE?',
        answer:'Ambiente de Desenvolvimento Integrado.'
      },

      {
        topic:'Python',
        question:'Qual estrutura toma decisões?',
        answer:'if, elif e else'
      },

      {
        topic:'HTML',
        question:'Qual tag cria uma divisão?',
        answer:'<div>'
      },

      {
        topic:'CSS',
        question:'Qual propriedade controla espaçamento interno?',
        answer:'padding'
      },

      {
        topic:'JavaScript',
        question:'Como declarar uma variável antiga?',
        answer:'var'
      },

      {
        topic:'Programação',
        question:'O que é código-fonte?',
        answer:'Código escrito pelo programador.'
      },

      {
        topic:'Python',
        question:'Como importar bibliotecas?',
        answer:'Usando import'
      },

      {
        topic:'HTML',
        question:'Qual tag cria formulário?',
        answer:'<form>'
      },

      {
        topic:'CSS',
        question:'Qual propriedade controla margem externa?',
        answer:'margin'
      },

      {
        topic:'JavaScript',
        question:'Qual método transforma JSON em objeto?',
        answer:'JSON.parse()'
      },

      {
        topic:'Programação',
        question:'O que é bug?',
        answer:'Erro no sistema.'
      }

    ];

    const container = document.getElementById('flashcards-container');

    flashcardsData.forEach(({topic, question, answer}) => {

      const card = document.createElement('div');
      card.className = 'flashcard';

      card.innerHTML = `
        <div class="card-inner">

          <div class="card-front">
            <h2>${topic}</h2>
            <p class="question-text">${question}</p>
          </div>

          <div class="card-back">
            <h3>Resposta</h3>
            <p class="answer-text">${answer}</p>
          </div>

        </div>
      `;

      card.addEventListener('click', () => {
        card.classList.toggle('flipped');
      });

      container.appendChild(card);

    });
  </script>

</body>
</html>
