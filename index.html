<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gerador de Senhas</title>
<style>
body{margin:0;font-family:Arial;background:#07121f;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#081018,#0d2742)}
.box{background:#12263acc;padding:30px;border-radius:18px;width:min(500px,92vw);box-shadow:0 0 30px #00ffc855}
h1{text-align:center;color:#00ffc8}.out{display:flex;gap:8px}input[type=text]{flex:1;padding:12px;border-radius:10px;border:none;font-size:18px}
button{padding:12px 16px;border:none;border-radius:10px;background:#00ffc8;color:#000;font-weight:bold;cursor:pointer}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:15px 0}
.bar{height:10px;background:#333;border-radius:10px;overflow:hidden}.fill{height:100%;width:0;background:#f33;transition:.3s}
small{display:block;margin-top:6px}
</style></head><body><div class="box">
<h1>🔐 Gerador de Senhas</h1>
<div class="out"><input id="pwd" type="text" readonly><button onclick="copyPwd()">📋</button></div>
<p>Comprimento: <span id="lenv">16</span></p>
<input id="len" type="range" min="4" max="64" value="16" style="width:100%">
<div class="opts">
<label><input id="up" type="checkbox" checked> Maiúsculas</label>
<label><input id="low" type="checkbox" checked> Minúsculas</label>
<label><input id="num" type="checkbox" checked> Números</label>
<label><input id="sym" type="checkbox" checked> Símbolos</label>
</div>
<div class="bar"><div id="fill" class="fill"></div></div><small id="txt"></small><br>
<button style="width:100%" onclick="gen()">⚡ Gerar Senha</button>
</div>
<script>
const U="ABCDEFGHIJKLMNOPQRSTUVWXYZ",L="abcdefghijklmnopqrstuvwxyz",N="0123456789",S="!@#$%&*()-_=+[]{}<>?/|";
const len=document.getElementById('len');len.oninput=()=>{lenv.textContent=len.value}
function rand(max){const a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]%max;}
function gen(){
 let chars="";
 if(up.checked)chars+=U;if(low.checked)chars+=L;if(num.checked)chars+=N;if(sym.checked)chars+=S;
 if(!chars){alert("Selecione ao menos uma opção.");return;}
 let p="";
 for(let i=0;i<+len.value;i++)p+=chars[rand(chars.length)];
 pwd.value=p;strength(p);
}
function strength(p){
 let s=0;if(p.length>=12)s++;if(/[A-Z]/.test(p))s++;if(/[a-z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;
 let w=s*20;fill.style.width=w+"%";
 fill.style.background=w<40?"#f33":w<80?"#fb0":"#0f0";
 txt.textContent=w<40?"Fraca":w<80?"Boa":"Muito Forte";
}
function copyPwd(){navigator.clipboard.writeText(pwd.value);alert("Senha copiada!");}
gen();
</script></body></html>
