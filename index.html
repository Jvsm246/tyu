<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Senhas Profissional</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.container{
    background:#1f2937;
    padding:30px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,255,255,.3);
}

h1{
    color:#00e5ff;
}

input{
    width:90%;
    padding:12px;
    font-size:18px;
    border:none;
    border-radius:8px;
    margin:15px 0;
    text-align:center;
}

label{
    display:block;
    margin:10px;
}

select{
    padding:8px;
    border-radius:8px;
    width:100%;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#00e5ff;
    color:#000;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00bcd4;
}

#forca{
    margin-top:15px;
    font-weight:bold;
}

</style>

</head>


<body>

<div class="container">

<h1>🔐 Gerador de Senhas</h1>

<input id="senha" readonly>


<label>
Tamanho da senha:
</label>

<select id="tamanho">
<option value="8">8 caracteres</option>
<option value="12">12 caracteres</option>
<option value="16" selected>16 caracteres</option>
<option value="24">24 caracteres</option>
</select>


<label>
<input type="checkbox" id="maiuscula" checked>
Letras maiúsculas
</label>

<label>
<input type="checkbox" id="numeros" checked>
Números
</label>

<label>
<input type="checkbox" id="simbolos" checked>
Símbolos
</label>


<div id="forca">
Força: -
</div>


<button onclick="gerarSenha()">
Gerar Senha
</button>

<button onclick="copiarSenha()">
Copiar Senha
</button>


</div>


<script>

function gerarSenha(){

let caracteres="";

if(document.getElementById("maiuscula").checked){
caracteres += "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
}else{
caracteres += "abcdefghijklmnopqrstuvwxyz";
}

if(document.getElementById("numeros").checked){
caracteres += "0123456789";
}

if(document.getElementById("simbolos").checked){
caracteres += "!@#$%&*";
}


let tamanho=document.getElementById("tamanho").value;

let senha="";


for(let i=0;i<tamanho;i++){

senha += caracteres[Math.floor(Math.random()*caracteres.length)];

}


document.getElementById("senha").value=senha;

avaliarSenha(senha);

}



function avaliarSenha(senha){

let resultado=document.getElementById("forca");

let pontos=0;


if(senha.length>=12) pontos++;
if(/[A-Z]/.test(senha)) pontos++;
if(/[0-9]/.test(senha)) pontos++;
if(/[!@#$%&*]/.test(senha)) pontos++;


if(pontos<=1){
resultado.innerHTML="Força: 🔴 Fraca";
}

else if(pontos==2){
resultado.innerHTML="Força: 🟠 Média";
}

else if(pontos==3){
resultado.innerHTML="Força: 🟡 Forte";
}

else{
resultado.innerHTML="Força: 🟢 Muito forte";
}

}



function copiarSenha(){

let campo=document.getElementById("senha");

navigator.clipboard.writeText(campo.value);

alert("Senha copiada!");

}


window.onload=gerarSenha;

</script>


</body>

</html>
