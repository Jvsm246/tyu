<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Senhas</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    background:#1f2937;
    padding:30px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,255,255,.3);
}

h1{
    color:#00e5ff;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    border:none;
    border-radius:8px;
    margin:15px 0;
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#00e5ff;
    color:#000;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00bcd4;
}
</style>

</head>
<body>

<div class="container">

<h1>🔐 Gerador de Senhas</h1>

<input type="text" id="senha" readonly>

<button onclick="gerarSenha()">
Gerar Senha
</button>

<button onclick="copiarSenha()">
Copiar Senha
</button>

</div>

<script>

function gerarSenha(){

const caracteres="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%&*";

let senha="";

for(let i=0;i<16;i++){

senha+=caracteres.charAt(Math.floor(Math.random()*caracteres.length));

}

document.getElementById("senha").value=senha;

}

function copiarSenha(){

const campo=document.getElementById("senha");

campo.select();

document.execCommand("copy");

alert("Senha copiada!");

}

gerarSenha();

</script>

</body>
</html>
